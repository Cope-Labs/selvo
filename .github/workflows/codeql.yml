name: CodeQL

# Weekly static analysis for common vulnerabilities in our own code —
# injection, auth bypass, insecure deserialization, etc. Free on public repos.
# Runs on push/PR to main plus a scheduled Monday run that catches issues
# introduced by newly-published CodeQL queries.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 13 * * 1"  # Monday 13:00 UTC (7:00 Central)

permissions:
  contents: read
  security-events: write   # upload findings to Security → Code scanning
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@662472033e021d55d94146f66f6058822b0b39fd # v3.27.0
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@662472033e021d55d94146f66f6058822b0b39fd # v3.27.0
        with:
          category: "/language:${{ matrix.language }}"
