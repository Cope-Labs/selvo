name: Docker — Build & Push to GHCR

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]   # build-only (no push) on PRs

permissions:
  contents: read
  packages: write         # push to ghcr.io
  id-token: write         # cosign keyless signing via sigstore OIDC
  security-events: write  # upload trivy SARIF to Security → Code scanning

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # Cope-Labs/selvo

jobs:
  docker:
    name: Build ${{ github.ref_type == 'tag' && 'and push' || '(PR, no push)' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0   # tags needed for hatch-vcs version

      # github.repository keeps the original case (Cope-Labs/selvo) but Docker
      # registries and Trivy require lowercase refs. docker-metadata-action's
      # tags output is already lowercased; for steps that reference the image
      # by digest, use this lowercase variant instead of env.IMAGE_NAME.
      - name: Compute lowercase image name
        id: img
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Cosign keyless signing works on content-addressed digests, so
          # the build must emit the digest as a step output.
          provenance: true
          sbom: true
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            GIT_REVISION=${{ github.sha }}

      # ── Supply-chain audits (push path only) ───────────────────────────────
      #
      # The three steps below run after a successful push to GHCR:
      #
      #   trivy  — scans the image for CVEs in OS packages + app deps and
      #            uploads SARIF to Code scanning so alerts surface in the
      #            Security tab. The scan is non-blocking (exit-code unset);
      #            severity is HIGH+ with --ignore-unfixed so we don't get
      #            paged about CVEs with no patched version.
      #
      #   syft   — generates a CycloneDX SBOM of the image. Stored as a
      #            workflow artifact AND attested to the image via cosign
      #            below, so consumers can verify contents without pulling.
      #
      #   cosign — signs the image digest via sigstore's keyless OIDC path,
      #            tying provenance to the GitHub Actions identity rather
      #            than a shared signing key we'd have to rotate.

      # Multi-arch buildx pushes to the registry but does not load the image
      # into the local Docker daemon — so Trivy (which inspects via the local
      # daemon by default) can't find it. Pull it explicitly; the login step
      # above already provided registry credentials.
      - name: Pull image for local scanning
        if: github.event_name != 'pull_request'
        run: docker pull "${{ env.REGISTRY }}/${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}"

      # Two-pass Trivy: first pass always produces a complete SARIF (exit-code=0)
      # so the upload step sees a well-formed file; a second conditional pass
      # can be added later if we want to hard-fail on CRITICAL.
      - name: Trivy image scan (SARIF for Code Scanning)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: github.event_name != 'pull_request' && always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Generate SBOM (CycloneDX)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          upload-artifact-retention: 90
          # Don't try to attach SBOM to the GitHub Release (would need
          # contents: write, which we deliberately don't grant). The SBOM
          # is attested to the image via cosign below — that's canonical.
          upload-release-assets: false

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign image with cosign (keyless)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest SBOM to image (keyless)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
        run: |
          cosign attest --yes --predicate sbom.cdx.json --type cyclonedx \
            "${IMAGE}@${DIGEST}"
