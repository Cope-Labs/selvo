name: Docker — Build & Push to GHCR

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]   # build-only (no push) on PRs

permissions:
  contents: read
  packages: write         # push to ghcr.io
  id-token: write         # cosign keyless signing via sigstore OIDC
  security-events: write  # upload trivy SARIF to Security → Code scanning

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # Cope-Labs/selvo

jobs:
  docker:
    name: Build ${{ github.ref_type == 'tag' && 'and push' || '(PR, no push)' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0   # tags needed for hatch-vcs version

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96 # v5.6.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Cosign keyless signing works on content-addressed digests, so
          # the build must emit the digest as a step output.
          provenance: true
          sbom: true
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            GIT_REVISION=${{ github.sha }}

      # ── Supply-chain audits (push path only) ───────────────────────────────
      #
      # The three steps below run after a successful push to GHCR:
      #
      #   trivy  — scans the built image for CVEs in OS packages + app deps.
      #            SARIF is uploaded to Code scanning so alerts show up in
      #            the Security tab. --exit-code 1 --severity CRITICAL fails
      #            the build if the image ships with a critical CVE.
      #
      #   syft   — generates a CycloneDX SBOM of the image, attached to the
      #            workflow run as an artifact. Consumers can verify what's
      #            inside the image without pulling it.
      #
      #   cosign — signs the image digest via sigstore's keyless OIDC path,
      #            meaning provenance is tied to the GitHub Actions identity
      #            rather than a shared signing key we'd have to rotate.

      - name: Trivy image scan (fail on CRITICAL)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@1f0aa582c8c8f5f7639610d6d38baddfea4fdcee # v0.9.2
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: github.event_name != 'pull_request' && always()
        uses: github/codeql-action/upload-sarif@9887d98ae49f1f598651b556d8c8f02f3ea065cb # v3.27.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Generate SBOM (CycloneDX)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@55dc4ee22412511ee8c3142cbea40418e6cec693 # v0.17.8
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          upload-artifact-retention: 90

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@1aa8e0f2454b781fbf0fbf306a4c9533a0c57409 # v3.7.0

      - name: Sign image with cosign (keyless)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest SBOM to image (keyless)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          cosign attest --yes --predicate sbom.cdx.json --type cyclonedx \
            "${IMAGE}@${DIGEST}"
