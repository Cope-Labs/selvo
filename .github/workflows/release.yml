name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

# On every v* tag:
#   * Build the selvo sdist + wheel (hatch-vcs reads the tag for version)
#   * Publish to PyPI via trusted publishing (OIDC — no long-lived token).
#   * Build + publish the VS Code extension (existing job).
#
# Prerequisite (one-time, PyPI UI):
#   https://pypi.org/manage/project/selvo/settings/publishing/
#   → Add publisher → GitHub
#     owner:            Cope-Labs
#     repository:       selvo
#     workflow_name:    release.yml
#     environment:      pypi
# The `environment: pypi` bind below must match what you enter there.

jobs:

  pypi:
    name: Publish selvo to PyPI (OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/selvo/
    permissions:
      contents: read
      id-token: write   # required by pypa/gh-action-pypi-publish for OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # tags for hatch-vcs

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Basic sanity-check
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4

  vscode-extension:
    name: Build & publish VS Code extension
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm install

      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npx tsc --noEmit  # type-check only; build via vsce

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        working-directory: vscode-extension
        run: vsce package --no-dependencies --out selvo-security.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: selvo-security-vsix
          path: vscode-extension/selvo-security.vsix

      - name: Publish to VS Code Marketplace
        if: ${{ vars.VSCE_PUBLISH == 'true' }}
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT not set, skipping VS Code Marketplace publish."
            exit 0
          fi
          vsce publish --no-dependencies --pat "$VSCE_PAT"

      # Gated like the VS Code Marketplace publish: requires both the secret
      # AND vars.OVSX_PUBLISH == 'true'. Open VSX rejects publishes to
      # unverified namespaces with "NAMESPACE IS NOT VERIFIED" — flip the
      # var only after the namespace is approved at
      # https://github.com/EclipseFdn/open-vsx.org/issues
      - name: Publish to Open VSX Registry
        if: ${{ vars.OVSX_PUBLISH == 'true' }}
        working-directory: vscode-extension
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT not set, skipping Open VSX publish."
            exit 0
          fi
          npm install -g ovsx
          ovsx create-namespace selvo-security --pat "$OVSX_PAT" || true
          ovsx publish selvo-security.vsix --pat "$OVSX_PAT"
