# selvo self-hosted reference deployment.
#
# Brings up two containers:
#   selvo  — the API + dashboard
#   caddy  — TLS-terminating reverse proxy with automatic Let's Encrypt
#
# Quick start:
#   1. Copy .env.example to .env and fill in the required values
#   2. Edit Caddyfile.example → save as Caddyfile, replace selvo.example.com
#      with your real domain (DNS A record must already point at this host)
#   3. docker compose up -d
#   4. Open https://your-domain — sign up, generate an API key, scan
#
# This is the same compose file selvo.dev runs in production. The image is
# multi-arch (linux/amd64 + linux/arm64), pulls from ghcr.io/cope-labs/selvo,
# and is built fresh on every push to main of the source repo.
services:
  selvo:
    image: ghcr.io/cope-labs/selvo:latest
    restart: unless-stopped
    environment:
      # Enable API-key auth. Set to 0 only for fully-trusted local testing.
      - SELVO_API_AUTH=1
    env_file:
      - .env
    volumes:
      # Persistent cache for OSV/EPSS/KEV data + per-org snapshots.
      - ./data:/root/.cache/selvo
    ports:
      # Bind only to localhost so Caddy is the only public-facing service.
      - '127.0.0.1:8765:8765'
    command: selvo-api --host 0.0.0.0 --port 8765
    deploy:
      resources:
        limits:
          # Tune for your box. 4 CPU / 4 GB comfortably handles a 2700-package
          # scan in ~15s on a Hetzner shared CPU.
          cpus: '4'
          memory: 4G

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    depends_on:
      - selvo
