apiVersion: v1
kind: ServiceAccount
{{- if .Values.serviceAccount.create }}
metadata:
  name: {{ include "selvo.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "selvo.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
